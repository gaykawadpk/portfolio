<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Case Not Found | PK.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono&family=Inter:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #0a0a0f;
      color: #f0f0f5;
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f0f0f5 0%, #c9a84c 50%, #e0c56a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #c9a84c;
    }
    p {
      color: #a0a0b8;
      font-size: 1.05rem;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #6a6a80;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #c9a84c;
      color: #fff;
      text-decoration: none;
      border-radius: 28px;
      font-weight: 600;
      transition: all 0.3s;
    }
    a:hover {
      background: #e0c56a;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201, 168, 76, 0.25);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Case Not Found 🔍</h1>
  <p>"When you have eliminated the impossible, whatever remains must be the truth." — And the truth is, this page doesn't exist.</p>
  <div class="mono">ERROR: Evidence file missing from 221B Baker Street</div>
  <a href="./">🔎 Return to the Crime Scene</a>
</body>
</html>
